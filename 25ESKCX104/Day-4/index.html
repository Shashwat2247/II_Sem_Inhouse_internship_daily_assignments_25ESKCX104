<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1 id="heading">Welcome to My Landing Page</h1>
        <p><b>Click Counetr Game</b></p>
        <hr>
        <button id="darkBtn">Dark Mode</button>
        <hr>
        <h2>Click Counter</h2>
        <p id="countDisplay"> Clicks : 0</p>
        <button id="countBtn">Click Me</button>
        <button id="resetBtn">Reset</button>
        <hr>
        <h2> Registration Form</h2>
        <form id="myForm">
            <input type="text"id="name"placeholder="Enter Name">
            <br>
            <input type="email"id="email"placeholder="Enter Email">
            <br>
            <button type="submit">Submit</button>
        </form>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
